pr-analysis:
  stage: test
  image: python:3.12-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apt-get update -qq && apt-get install -y curl jq --quiet
    - pip install pydantic --quiet
  script:
    - git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD > pr.diff
    - python3 -c "import json,os; open('payload.json','w').write(json.dumps({'diff':open('pr.diff').read(),'pr_title':os.environ.get('CI_MERGE_REQUEST_TITLE',''),'repo':os.environ.get('CI_PROJECT_PATH',''),'pr_number':int(os.environ.get('CI_MERGE_REQUEST_IID',0))}))"
    - RESPONSE=$(curl -s -X POST "$API_GATEWAY_URL" -H "Content-Type: application/json" -d @payload.json)
    - echo "API Response $RESPONSE"
    - |
      NOTE=$(echo "$RESPONSE" | jq -r '.body' | jq -r '"**Tag:** `\(.modification_tag)`\n\n**Summary:** \(.summary)\n\n**Risks:**\n" + (.risk_notes | map("- " + .) | join("\n"))')
      curl -s --request POST \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes" \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        --data-urlencode "body=$NOTE"
  variables:
    API_GATEWAY_URL: $API_GATEWAY_URL
