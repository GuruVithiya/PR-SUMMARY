name: PR Analysis

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "diff_b64=$(base64 -w0 pr.diff)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Invoke PR Risk Generator API
        id: analysis
        run: |
          DIFF_JSON=$(python3 -c 'import sys,json; print(json.dumps(open("pr.diff").read()))')
          RESPONSE=$(curl -sf -X POST \
            "${{ secrets.API_GATEWAY_URL }}/analyze" \
            -H "Content-Type: application/json" \
            -d "{
              \"diff\": $DIFF_JSON,
              \"pr_title\": $(echo '${{ github.event.pull_request.title }}' | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))'),
              \"repo\": \"${{ github.repository }}\",
              \"pr_number\": ${{ github.event.pull_request.number }}
            }")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Post analysis as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const analysis = JSON.parse(`${{ steps.analysis.outputs.response }}`);
            const body = [
              `## PR Analysis`,
              `**Tag:** \`${analysis.modification_tag}\``,
              `### Summary`,
              analysis.summary,
              `### Risk Notes`,
              analysis.risk_notes.map(r => `- ${r}`).join('\n'),
              `### Test Checklist`,
              analysis.test_checklist.map(t => `- [ ] ${t}`).join('\n'),
            ].join('\n\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
