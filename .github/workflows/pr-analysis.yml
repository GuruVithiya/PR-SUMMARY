name: PR Analysis

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Invoke PR Risk Generator API
        id: analysis
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          API_URL: ${{ secrets.API_GATEWAY_URL }}
        run: |
          python3 << 'EOF'
import json, os
payload = json.dumps({
    'diff': open('pr.diff').read(),
    'pr_title': os.environ['PR_TITLE'],
    'repo': os.environ['PR_REPO'],
    'pr_number': int(os.environ['PR_NUMBER'])
})
with open('payload.json', 'w') as f:
    f.write(payload)
EOF
          RESPONSE=$(curl -s -X POST \
            "$API_URL/analyze" \
            -H "Content-Type: application/json" \
            -d @payload.json)
          echo "API Response: $RESPONSE"
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Post analysis as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const analysis = JSON.parse(`${{ steps.analysis.outputs.response }}`);
            const body = [
              `## PR Analysis`,
              `**Tag:** \`${analysis.modification_tag}\``,
              `### Summary`,
              analysis.summary,
              `### Risk Notes`,
              analysis.risk_notes.map(r => `- ${r}`).join('\n'),
              `### Test Checklist`,
              analysis.test_checklist.map(t => `- [ ] ${t}`).join('\n'),
            ].join('\n\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
